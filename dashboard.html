<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IIT — Dashboard Órdenes de Servicio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b10;
    --surface: #0d1117;
    --surface2: #131820;
    --surface3: #192030;
    --border: #1e2a38;
    --accent: #00d4ff;
    --accent2: #0077ff;
    --text: #e8f0f8;
    --muted: #4a6070;
    --success: #00e5a0;
    --error: #ff4560;
    --warn: #ffb700;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Topbar */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(8,11,16,0.97);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 60px;
    display: flex;
    align-items: center;
    gap: 20px;
    backdrop-filter: blur(12px);
  }

  .logo-pill {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-box {
    width: 36px; height: 36px;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .logo-name {
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700;
    color: var(--text);
  }

  .topbar-sep { flex: 1; }

  .nav-pill {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.5px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    text-decoration: none;
    transition: all 0.2s;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
  }

  .nav-pill:hover { border-color: var(--accent2); color: var(--accent); }

  .btn-new {
    padding: 8px 18px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 7px;
    font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 700;
    color: #080b10;
    cursor: pointer;
    letter-spacing: 0.5px;
    text-decoration: none;
    transition: opacity 0.2s;
  }

  .btn-new:hover { opacity: 0.85; }

  /* Main */
  .main {
    position: relative;
    z-index: 1;
    padding: 28px;
    max-width: 1280px;
    margin: 0 auto;
  }

  /* Stats cards */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  @media (max-width: 800px) { .stats-row { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 480px) { .stats-row { grid-template-columns: 1fr; } }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .stat-card.total::before  { background: linear-gradient(90deg, var(--accent2), var(--accent)); }
  .stat-card.pend::before   { background: var(--warn); }
  .stat-card.activa::before { background: var(--accent2); }
  .stat-card.cerrada::before{ background: var(--success); }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }

  .stat-card.total  .stat-value { color: var(--accent); }
  .stat-card.pend   .stat-value { color: var(--warn); }
  .stat-card.activa .stat-value { color: var(--accent2); }
  .stat-card.cerrada.stat-value { color: var(--success); }

  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* Filters */
  .filters-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .search-input {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--accent2); }
  .search-input::placeholder { color: var(--muted); opacity: 0.5; }

  .filter-btn {
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--accent2); color: var(--text); }
  .filter-btn.active { background: rgba(0,119,255,0.1); border-color: var(--accent2); color: var(--accent); }

  /* Table */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .table-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(0,0,0,0.2);
  }

  .table-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }

  .count-badge {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    padding: 12px 16px;
    text-align: left;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    cursor: pointer;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  td {
    padding: 14px 16px;
    font-size: 12px;
    vertical-align: middle;
  }

  .order-id {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    color: var(--accent);
    font-size: 13px;
    letter-spacing: 0.5px;
  }

  .empresa-name { color: var(--text); font-size: 13px; }
  .contact-name { color: var(--muted); font-size: 11px; margin-top: 2px; }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 10px;
    letter-spacing: 1px;
    font-weight: 600;
    white-space: nowrap;
  }

  .status-badge.pendiente {
    background: rgba(255,183,0,0.1);
    border: 1px solid rgba(255,183,0,0.3);
    color: var(--warn);
  }

  .status-badge.enviada {
    background: rgba(0,119,255,0.1);
    border: 1px solid rgba(0,119,255,0.3);
    color: var(--accent2);
  }

  .status-badge.en-proceso {
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.3);
    color: var(--accent);
  }

  .status-badge.cerrada {
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--success);
  }

  .priority-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
  }

  .pri-baja    { background: var(--success); }
  .pri-media   { background: var(--warn); }
  .pri-alta    { background: var(--error); }
  .pri-critica { background: var(--error); box-shadow: 0 0 6px var(--error); }

  .date-cell { color: var(--muted); font-size: 11px; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 640px;
    max-height: 90vh;
    overflow-y: auto;
    animation: modalIn 0.25s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-head {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
  }

  .modal-head h2 {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .btn-close {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    transition: all 0.2s;
  }

  .btn-close:hover { border-color: var(--error); color: var(--error); }

  .btn-pdf {
    background: rgba(0,229,160,0.08);
    border: 1px solid rgba(0,229,160,0.3);
    border-radius: 6px;
    padding: 6px 14px;
    color: var(--success);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }

  .btn-pdf:hover { background: rgba(0,229,160,0.15); border-color: var(--success); }

  .modal-body { padding: 24px; }

  .detail-section { margin-bottom: 24px; }
  .detail-section-title {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .detail-field {}
  .detail-label { font-size: 9px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 3px; }
  .detail-value { font-size: 13px; color: var(--text); }

  .full-width { grid-column: 1 / -1; }

  /* Status control */
  .status-control {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .status-btn {
    padding: 7px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }

  .status-btn:hover { border-color: var(--accent2); color: var(--text); }
  .status-btn.active { background: rgba(0,119,255,0.1); border-color: var(--accent2); color: var(--accent); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .empty-state p { font-size: 13px; margin-bottom: 20px; letter-spacing: 0.5px; }

  /* Responsive table */
  @media (max-width: 700px) {
    .col-area, .col-fecha, .col-prioridad { display: none; }
    td { padding: 12px; }
  }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: all 0.2s;
  }

  .refresh-btn:hover { border-color: var(--accent2); color: var(--accent); }
</style>
</head>

<script>
// ─── CONFIG ────────────────────────────────────────────────────
const CONFIG = {
  jsonbin_id:  '69e6c4f6aaba8821971e2a15',
  jsonbin_key: '$2a$10$I8tdi11OHg1BBTt7Pyurkuf3deSsGHO3jfvOuvtCJJpKzoLV4NRHi',
  formBaseUrl: 'https://infraestructura-it.github.io/iit-ordenes-servicio/orden.html'
};

let allOrders = [];
let currentFilter = 'all';
let currentSearch = '';

// ─── LOAD ORDERS ──────────────────────────────────────────────
async function loadOrders() {
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.jsonbin_id}/latest`, {
      headers: { 'X-Master-Key': CONFIG.jsonbin_key }
    });
    const data = await res.json();
    allOrders = data.record?.ordenes || [];
    // Combinar con localStorage por si hay órdenes offline
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key.startsWith('iit-orden-')) {
        try {
          const o = JSON.parse(localStorage.getItem(key));
          if (!allOrders.find(x => x.orderId === o.orderId)) allOrders.push(o);
        } catch {}
      }
    }
  } catch {
    allOrders = loadDemoOrders();
  }
  render();
}

function loadDemoOrders() {
  const local = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('iit-orden-')) {
      try { local.push(JSON.parse(localStorage.getItem(key))); } catch {}
    }
  }

  const demo = [
    {
      orderId: 'IIT-260420-7823', nombre: 'Carlos Morales', empresa: 'Proarques SAS',
      telefono: '+57 310 555 0001', correo: 'carlos@proarques.com',
      ciudad: 'Carmen de Apicalá', tipoServicio: 'Mantenimiento Preventivo',
      area: 'Energía Solar / UPS', prioridad: 'media', status: 'enviada',
      createdAt: new Date(Date.now() - 86400000*2).toISOString(),
      sintoma: 'Revisión periódica del sistema solar off-grid. Verificar baterías LiFePO4 y DTU.'
    },
    {
      orderId: 'IIT-260419-3301', nombre: 'Luisa Fernández', empresa: 'Datatech Colombia',
      telefono: '+57 315 222 8844', correo: 'lfernan@datatech.co',
      ciudad: 'Bogotá D.C.', tipoServicio: 'Soporte Correctivo',
      area: 'Data Center / Servidores', prioridad: 'alta', status: 'en-proceso',
      createdAt: new Date(Date.now() - 86400000*1).toISOString(),
      sintoma: 'Servidor HP ProLiant sin respuesta. Fallo en POST al arrancar.'
    },
    {
      orderId: 'IIT-260418-5512', nombre: 'Jorge Betancur', empresa: 'Comercial El Éxito',
      telefono: '+57 300 900 1234', correo: 'jbetancur@exito.com',
      ciudad: 'Medellín', tipoServicio: 'Instalación / Montaje',
      area: 'Redes y Cableado Estructurado', prioridad: 'baja', status: 'cerrada',
      createdAt: new Date(Date.now() - 86400000*5).toISOString(),
      sintoma: 'Instalación de cableado Cat6A en nuevo piso de oficinas.'
    },
    {
      orderId: 'IIT-260420-9901', nombre: 'Marta González', empresa: 'IPS Salud Norte',
      telefono: '+57 320 444 7788', correo: 'mgonzalez@saludnorte.co',
      ciudad: 'Barranquilla', tipoServicio: 'Revisión / Diagnóstico',
      area: 'Cómputo / Equipos de Usuario', prioridad: 'critica', status: 'pendiente',
      createdAt: new Date().toISOString(),
      sintoma: 'Caída masiva de equipos de usuario en sede hospitalaria. Posible fallo de switch core.'
    }
  ];

  return [...demo, ...local].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
}

// ─── RENDER ────────────────────────────────────────────────────
function render() {
  const filtered = allOrders.filter(o => {
    if (currentFilter !== 'all' && o.status !== currentFilter) return false;
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      return [o.orderId, o.empresa, o.nombre, o.correo, o.ciudad, o.area].join(' ').toLowerCase().includes(q);
    }
    return true;
  });

  // Stats
  document.getElementById('statTotal').textContent  = allOrders.length;
  document.getElementById('statPend').textContent   = allOrders.filter(o => o.status === 'pendiente').length;
  document.getElementById('statActiva').textContent = allOrders.filter(o => o.status === 'enviada').length;
  document.getElementById('statCerrada').textContent= allOrders.filter(o => o.status === 'cerrada').length;
  document.getElementById('countBadge').textContent = `${filtered.length} de ${allOrders.length} órdenes`;

  const container = document.getElementById('tableBody');

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⬡</div>
        <p>No hay órdenes que coincidan con el filtro</p>
        <a href="index.html" class="btn-new" style="display:inline-block;">+ CREAR PRIMERA ORDEN</a>
      </div>`;
    return;
  }

  const rows = filtered.map(o => {
    const fecha = new Date(o.createdAt).toLocaleDateString('es-CO', { day:'2-digit', month:'short' });
    const hora  = new Date(o.createdAt).toLocaleTimeString('es-CO', { hour:'2-digit', minute:'2-digit' });
    const priClass = { baja:'pri-baja', media:'pri-media', alta:'pri-alta', critica:'pri-critica' }[o.prioridad] || 'pri-media';
    return `
    <tr onclick="openModal('${o.orderId}')">
      <td><div class="order-id">${o.orderId}</div></td>
      <td>
        <div class="empresa-name">${o.empresa || '—'}</div>
        <div class="contact-name">${o.nombre || ''}</div>
      </td>
      <td class="col-area" style="color:var(--muted);font-size:11px;">${o.area || o.tipoServicio || '—'}</td>
      <td class="col-prioridad">
        <span class="priority-dot ${priClass}"></span>
        <span style="font-size:11px;color:var(--muted);letter-spacing:0.5px;">${(o.prioridad||'—').toUpperCase()}</span>
      </td>
      <td><span class="status-badge ${o.status}">${(o.status||'—').replace('-',' ')}</span></td>
      <td class="date-cell col-fecha">${fecha}<br>${hora}</td>
    </tr>`;
  }).join('');

  container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>NO. ORDEN</th>
          <th>EMPRESA / CONTACTO</th>
          <th class="col-area">ÁREA</th>
          <th class="col-prioridad">PRIORIDAD</th>
          <th>ESTADO</th>
          <th class="col-fecha">FECHA</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ─── MODAL ────────────────────────────────────────────────────
function openModal(orderId) {
  const o = allOrders.find(x => x.orderId === orderId);
  if (!o) return;
  _ordenActual = o; // guardar para generarPDF

  document.getElementById('modalOrderId').textContent = o.orderId;
  document.getElementById('modalStatusBadge').textContent = (o.status || '').replace('-',' ');
  document.getElementById('modalStatusBadge').className = `status-badge ${o.status}`;

  const formUrl = `${CONFIG.formBaseUrl}?orden=${encodeURIComponent(o.orderId)}&nombre=${encodeURIComponent(o.nombre||'')}&telefono=${encodeURIComponent(o.telefono||'')}&correo=${encodeURIComponent(o.correo||'')}&empresa=${encodeURIComponent(o.empresa||'')}`;

  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(formUrl)}&bgcolor=ffffff&color=080b10&margin=2`;

  const detail = (label, val) => val ? `
    <div class="detail-field">
      <div class="detail-label">${label}</div>
      <div class="detail-value">${val}</div>
    </div>` : '';

  const formatDate = s => s ? new Date(s).toLocaleString('es-CO') : '—';
  const equiposStr = Array.isArray(o.equipos) ? o.equipos.join(', ') : (o.equipos || '—');

  document.getElementById('modalBody').innerHTML = `
    <div class="detail-section">
      <div class="detail-section-title">SOLICITANTE</div>
      <div class="detail-grid">
        ${detail('NOMBRE', o.nombre)}
        ${detail('EMPRESA', o.empresa)}
        ${detail('TELÉFONO', o.telefono)}
        ${detail('CORREO', o.correo)}
        ${detail('CARGO', o.cargo)}
        ${detail('CIUDAD', o.ciudad + (o.departamento ? ', ' + o.departamento : ''))}
        ${detail('DIRECCIÓN', o.direccion)}
        ${detail('PERSONA QUE RECIBE', o.personaRecibe)}
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">SERVICIO</div>
      <div class="detail-grid">
        ${detail('TIPO', o.tipoServicio)}
        ${detail('ÁREA', o.area)}
        ${detail('PRIORIDAD', (o.prioridad||'').toUpperCase())}
        ${detail('FECHA REQUERIDA', o.fechaRequerida)}
        ${detail('VENTANA', o.ventana)}
        ${detail('DURACIÓN', o.duracion)}
        <div class="detail-field full-width">${detail('SÍNTOMA / DESCRIPCIÓN', o.sintoma)}</div>
      </div>
    </div>

    ${o.equipos ? `
    <div class="detail-section">
      <div class="detail-section-title">EQUIPOS</div>
      <div class="detail-grid">
        ${detail('EQUIPOS AFECTADOS', equiposStr)}
        ${detail('MARCA / MODELO', o.marca)}
        ${detail('N° SERIE', o.serie)}
        <div class="detail-field full-width">${detail('OBSERVACIONES', o.obsEquipos)}</div>
      </div>
    </div>` : ''}

    <div class="detail-section">
      <div class="detail-section-title">CONTROL DE ESTADO</div>
      <div class="status-control" id="statusControl">
        ${['pendiente','enviada','en-proceso','cerrada'].map(s => `
          <button class="status-btn ${o.status===s?'active':''}" onclick="updateStatus('${o.orderId}','${s}')">${s.replace('-',' ').toUpperCase()}</button>
        `).join('')}
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">ACCESO RÁPIDO</div>
      <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;">
        <div style="background:white;padding:8px;border-radius:6px;">
          <img src="${qrUrl}" alt="QR" width="100" height="100">
        </div>
        <div>
          <a href="${formUrl}" target="_blank" style="display:block;margin-bottom:8px;color:var(--accent);font-size:12px;letter-spacing:0.5px;">↗ Abrir formulario completo</a>

          ${o.completadoAt ? `<div style="font-size:10px;color:var(--muted);letter-spacing:0.5px;">Completada: ${formatDate(o.completadoAt)}</div>` : ''}
        </div>

    </div>
  `;

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// ─── STATUS UPDATE ────────────────────────────────────────────
async function updateStatus(orderId, newStatus) {
  const o = allOrders.find(x => x.orderId === orderId);
  if (!o) return;
  o.status = newStatus;

  try {
    // Escribir todo el array actualizado en JSONBin
    await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.jsonbin_id}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': CONFIG.jsonbin_key
      },
      body: JSON.stringify({ ordenes: allOrders })
    });
  } catch {
    const key = `iit-orden-${orderId}`;
    const stored = localStorage.getItem(key);
    if (stored) {
      const parsed = JSON.parse(stored);
      parsed.status = newStatus;
      localStorage.setItem(key, JSON.stringify(parsed));
    }
  }

  // Re-render modal status buttons
  document.querySelectorAll('.status-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase().replace(' ','-') === newStatus);
  });
  document.getElementById('modalStatusBadge').textContent = newStatus.replace('-',' ');
  document.getElementById('modalStatusBadge').className = `status-badge ${newStatus}`;

  render();
}

// ─── FILTERS & SEARCH ─────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value;
  render();
});

document.getElementById('refreshBtn').addEventListener('click', loadOrders);

// ─── GENERAR PDF ──────────────────────────────────────────────
let _ordenActual = null; // orden abierta en el modal

async function generarPDF() {
  if (!_ordenActual) return;
  const o = _ordenActual;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });

  const W = 210; // ancho A4
  const margen = 18;
  let y = 0;

  // ── PALETA ──
  const DARK   = [8,  11, 16];
  const CYAN   = [0,  212, 255];
  const BLUE   = [0,  119, 255];
  const WHITE  = [232,240,248];
  const MUTED  = [74, 96, 112];
  const BORDER = [30, 42, 56];
  const GREEN  = [0,  229, 160];
  const WARN   = [255,183,0];
  const RED    = [255,69, 96];

  // ── HEADER DEGRADADO ──
  doc.setFillColor(...DARK);
  doc.rect(0, 0, W, 40, 'F');

  // Barra cyan superior
  doc.setFillColor(...CYAN);
  doc.rect(0, 0, W, 2, 'F');

  // Logo IIT imagen
  const LOGO_B64 = await cargarImagen('https://infraestructura-it.github.io/iit-ordenes-servicio/logo_transparente_limpio_512.png').catch(() => null);
  if (LOGO_B64) {
    doc.setFillColor(...DARK);
    doc.rect(margen, 6, 22, 22, 'F');
    doc.addImage(LOGO_B64, 'PNG', margen, 6, 22, 22);
  } else {
    // Fallback: box IIT
    doc.setFillColor(...BLUE);
    doc.roundedRect(margen, 8, 18, 18, 2, 2, 'F');
    doc.setTextColor(...DARK);
    doc.setFontSize(9);
    doc.setFont('helvetica','bold');
    doc.text('IIT', margen + 9, 19, { align: 'center' });
  }

  // Nombre empresa
  doc.setTextColor(...WHITE);
  doc.setFontSize(13);
  doc.setFont('helvetica','bold');
  doc.text('Infraestructura-IT', margen + 22, 15);
  doc.setTextColor(...MUTED);
  doc.setFontSize(7);
  doc.setFont('helvetica','normal');
  doc.text('SOPORTE & MANTENIMIENTO · BOGOTÁ, COLOMBIA', margen + 22, 21);

  // OS ID derecha
  doc.setTextColor(...CYAN);
  doc.setFontSize(14);
  doc.setFont('helvetica','bold');
  doc.text(o.orderId || '—', W - margen, 15, { align: 'right' });
  doc.setTextColor(...MUTED);
  doc.setFontSize(7);
  doc.setFont('helvetica','normal');
  doc.text('ORDEN DE SERVICIO', W - margen, 21, { align: 'right' });

  // Status badge
  const statusColor = {
    pendiente: WARN, enviada: BLUE, 'en-proceso': CYAN, cerrada: GREEN
  }[o.status] || MUTED;
  doc.setFillColor(...statusColor);
  doc.roundedRect(W - margen - 28, 25, 28, 7, 1.5, 1.5, 'F');
  doc.setTextColor(...DARK);
  doc.setFontSize(7);
  doc.setFont('helvetica','bold');
  doc.text((o.status || 'pendiente').toUpperCase().replace('-',' '), W - margen - 14, 29.5, { align: 'center' });

  // Fecha
  doc.setTextColor(...MUTED);
  doc.setFontSize(7);
  doc.setFont('helvetica','normal');
  doc.text(o.createdAt ? new Date(o.createdAt).toLocaleString('es-CO') : '—', margen + 22, 29);

  y = 48;

  // ── FUNCIÓN HELPERS ──
  const seccion = (titulo, color = BLUE) => {
    doc.setFillColor(...DARK);
    doc.rect(margen, y, W - margen*2, 7, 'F');
    doc.setFillColor(...color);
    doc.rect(margen, y, 3, 7, 'F');
    doc.setTextColor(...WHITE);
    doc.setFontSize(8);
    doc.setFont('helvetica','bold');
    doc.text(titulo, margen + 6, y + 5);
    y += 10;
  };

  const campo = (label, valor, x = margen, ancho = W - margen*2) => {
    if (!valor || valor === '—') return;
    doc.setTextColor(...MUTED);
    doc.setFontSize(7);
    doc.setFont('helvetica','normal');
    doc.text(label.toUpperCase(), x, y);
    doc.setTextColor(...WHITE);
    doc.setFontSize(8.5);
    doc.setFont('helvetica','bold');
    // wrap texto largo
    const lines = doc.splitTextToSize(String(valor), ancho - 45);
    doc.text(lines, x + 44, y);
    y += Math.max(6, lines.length * 5);
  };

  const lineaSep = () => {
    doc.setDrawColor(...BORDER);
    doc.setLineWidth(0.3);
    doc.line(margen, y, W - margen, y);
    y += 4;
  };

  const check = (y_pos) => {
    // fondo superficie
    doc.setFillColor(13, 17, 23);
    doc.rect(margen, y_pos - 4, W - margen*2, y - y_pos + 8, 'F');
    doc.setDrawColor(...BORDER);
    doc.setLineWidth(0.3);
    doc.rect(margen, y_pos - 4, W - margen*2, y - y_pos + 8);
  };

  // ── SECCIÓN 1 — DATOS SOLICITANTE ──
  seccion('1. DATOS DEL SOLICITANTE');
  const y1 = y;
  campo('Nombre',   o.nombre);
  campo('Empresa',  o.empresa);
  campo('Teléfono', o.telefono);
  campo('Correo',   o.correo);
  campo('Cargo',    o.cargo);
  lineaSep();

  // ── SECCIÓN 2 — UBICACIÓN ──
  seccion('2. UBICACIÓN DEL SERVICIO');
  campo('Ciudad',    o.ciudad + (o.departamento ? ', ' + o.departamento : ''));
  campo('Dirección', o.direccion);
  campo('Referencia',o.referencia);
  campo('Recibe',    o.personaRecibe);
  lineaSep();

  // ── SECCIÓN 3 — SERVICIO ──
  seccion('3. DESCRIPCIÓN DEL SERVICIO');
  campo('Tipo',      o.tipoServicio);
  campo('Área',      o.area);

  // Prioridad con color
  if (o.prioridad) {
    const priColor = { baja: GREEN, media: WARN, alta: RED, critica: RED }[o.prioridad] || MUTED;
    doc.setTextColor(...MUTED);
    doc.setFontSize(7);
    doc.setFont('helvetica','normal');
    doc.text('PRIORIDAD', margen, y);
    doc.setFillColor(...priColor);
    doc.roundedRect(margen + 44, y - 4, 22, 6, 1, 1, 'F');
    doc.setTextColor(...DARK);
    doc.setFontSize(7);
    doc.setFont('helvetica','bold');
    doc.text(o.prioridad.toUpperCase(), margen + 55, y, { align: 'center' });
    y += 7;
  }

  campo('Fecha req.', o.fechaRequerida);
  campo('Ventana',    o.ventana);
  campo('Duración',   o.duracion);

  if (o.sintoma) {
    doc.setTextColor(...MUTED);
    doc.setFontSize(7);
    doc.text('SÍNTOMA', margen, y);
    doc.setTextColor(...WHITE);
    doc.setFontSize(8);
    doc.setFont('helvetica','normal');
    const lines = doc.splitTextToSize(o.sintoma, W - margen*2 - 44);
    doc.text(lines, margen + 44, y);
    y += lines.length * 5 + 2;
  }
  lineaSep();

  // Nueva página si queda poco espacio
  if (y > 220) { doc.addPage(); y = 20; }

  // ── SECCIÓN 4 — EQUIPOS ──
  if (o.equipos?.length || o.marca) {
    seccion('4. EQUIPOS INVOLUCRADOS', CYAN);
    if (o.equipos?.length) campo('Equipos', o.equipos.join(', '));
    campo('Marca/Modelo', o.marca);
    campo('N° Serie',     o.serie);
    campo('Observaciones',o.obsEquipos);
    lineaSep();
  }

  // ── SECCIÓN 5 — ADICIONAL ──
  if (o.antecedentes || o.contrato || o.notas) {
    seccion('5. INFORMACIÓN ADICIONAL', MUTED);
    campo('Contrato',     o.contrato);
    campo('Centro costo', o.centroCosto);
    campo('Antecedentes', o.antecedentes);
    campo('Notas',        o.notas);
    lineaSep();
  }

  // Nueva página si queda poco espacio
  if (y > 210) { doc.addPage(); y = 20; }

  // ── SECCIÓN 6 — QR ──
  seccion('6. CÓDIGO QR — ACCESO DIRECTO', GREEN);

  // Generar QR como imagen usando canvas oculto
  const formUrl = `https://infraestructura-it.github.io/iit-ordenes-servicio/orden.html?orden=${encodeURIComponent(o.orderId)}&nombre=${encodeURIComponent(o.nombre||'')}&telefono=${encodeURIComponent(o.telefono||'')}&correo=${encodeURIComponent(o.correo||'')}&empresa=${encodeURIComponent(o.empresa||'')}`;

  // QR via API como imagen
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(formUrl)}&bgcolor=ffffff&color=000000&margin=2`;

  try {
    const qrImg = await cargarImagen(qrUrl);
    doc.addImage(qrImg, 'PNG', margen, y, 35, 35);
  } catch {}

  doc.setTextColor(...MUTED);
  doc.setFontSize(7);
  doc.text('Escanee para abrir el formulario completo', margen + 40, y + 8);
  doc.setTextColor(...CYAN);
  doc.setFontSize(7);
  const urlLines = doc.splitTextToSize(formUrl, W - margen*2 - 42);
  doc.text(urlLines, margen + 40, y + 14);
  y += 40;
  lineaSep();

  // ── FOOTER ──
  const totalPages = doc.internal.getNumberOfPages();
  for (let i = 1; i <= totalPages; i++) {
    doc.setPage(i);
    doc.setFillColor(...DARK);
    doc.rect(0, 285, W, 12, 'F');
    doc.setDrawColor(...BORDER);
    doc.setLineWidth(0.3);
    doc.line(0, 285, W, 285);
    doc.setTextColor(...MUTED);
    doc.setFontSize(7);
    doc.text('INFRAESTRUCTURA-IT · BOGOTÁ, COLOMBIA · Sistema de Órdenes de Servicio v1.0', margen, 291);
    doc.text(`Página ${i} / ${totalPages}`, W - margen, 291, { align: 'right' });
  }

  // ── GUARDAR ──
  doc.save(`OS-IIT-${o.orderId}-${new Date().toISOString().slice(0,10)}.pdf`);
}

// Helper: cargar imagen como dataURL
function cargarImagen(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      canvas.getContext('2d').drawImage(img, 0, 0);
      resolve(canvas.toDataURL('image/png'));
    };
    img.onerror = reject;
    img.src = url;
  });
}

// ─── INIT ─────────────────────────────────────────────────────
loadOrders();
</script>
